# Site settings
title: "Bristol Paleo Modelling Group"
# TODO: replace with the real department/university line
tagline: "Fig Text University · Fig Text Department"
department: "Fig Text University"
url: "https://paleo-modelling-bristol.github.io"
baseurl: "/website"

# TODO: replace with the real group contact address
contact_email: "fig.text@bristol.ac.uk"

# Favicon
favicon: "/assets/images/favicon.png"

# Build settings
markdown: kramdown

# Include/exclude
include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore

# Collections
collections:
  people:
    output: true
    permalink: /people/:path/

defaults:
  - scope:
      path: ""
      type: people
    values:
      layout: person

# Plugins (must stay within the github-pages native-build whitelist)
plugins:
  - jekyll-sitemap
